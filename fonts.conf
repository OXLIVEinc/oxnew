<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Point Fontconfig to your custom fonts directory -->
  <dir>./public/fonts</dir>
  
  <!-- Fallback/alias configuration -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Arial</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Inter</string>
    </edit>
  </match>
</fontconfig>